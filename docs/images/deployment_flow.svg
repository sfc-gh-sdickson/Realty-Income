<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Arial, sans-serif">
  <rect width="900" height="500" fill="#F8FAFC" rx="8"/>

  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1B9CD9">Deployment Flow</text>

  <rect x="30" y="50" width="160" height="60" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2" rx="6"/>
  <text x="110" y="75" text-anchor="middle" font-size="10" font-weight="bold" fill="#2E7D32">Step 1</text>
  <text x="110" y="92" text-anchor="middle" font-size="9" fill="#333">Database &amp; Schemas</text>
  <text x="110" y="104" text-anchor="middle" font-size="8" fill="#666">Warehouse, Stages</text>

  <rect x="210" y="50" width="160" height="60" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2" rx="6"/>
  <text x="290" y="75" text-anchor="middle" font-size="10" font-weight="bold" fill="#2E7D32">Step 2</text>
  <text x="290" y="92" text-anchor="middle" font-size="9" fill="#333">Create 9 Tables</text>
  <text x="290" y="104" text-anchor="middle" font-size="8" fill="#666">Properties, Tenants, etc.</text>

  <rect x="390" y="50" width="160" height="60" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2" rx="6"/>
  <text x="470" y="75" text-anchor="middle" font-size="10" font-weight="bold" fill="#2E7D32">Step 3</text>
  <text x="470" y="92" text-anchor="middle" font-size="9" fill="#333">FIBO Ontology</text>
  <text x="470" y="104" text-anchor="middle" font-size="8" fill="#666">Tags &amp; Classification</text>

  <rect x="570" y="50" width="160" height="60" fill="#FFF3E0" stroke="#FF9800" stroke-width="2" rx="6"/>
  <text x="650" y="75" text-anchor="middle" font-size="10" font-weight="bold" fill="#E65100">Step 4</text>
  <text x="650" y="92" text-anchor="middle" font-size="9" fill="#333">Synthetic Data</text>
  <text x="650" y="104" text-anchor="middle" font-size="8" fill="#666">~7,700 rows</text>

  <rect x="750" y="50" width="120" height="60" fill="#E3F2FD" stroke="#2196F3" stroke-width="2" rx="6"/>
  <text x="810" y="75" text-anchor="middle" font-size="10" font-weight="bold" fill="#1565C0">Step 5</text>
  <text x="810" y="92" text-anchor="middle" font-size="9" fill="#333">Analytics Views</text>
  <text x="810" y="104" text-anchor="middle" font-size="8" fill="#666">8 Views</text>

  <path d="M190,80 L210,80" fill="none" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M370,80 L390,80" fill="none" stroke="#666" stroke-width="1.5"/>
  <path d="M550,80 L570,80" fill="none" stroke="#666" stroke-width="1.5"/>
  <path d="M730,80 L750,80" fill="none" stroke="#666" stroke-width="1.5"/>

  <path d="M810,110 L810,140" fill="none" stroke="#666" stroke-width="1.5"/>

  <rect x="30" y="140" width="200" height="60" fill="#E3F2FD" stroke="#2196F3" stroke-width="2" rx="6"/>
  <text x="130" y="165" text-anchor="middle" font-size="10" font-weight="bold" fill="#1565C0">Step 6</text>
  <text x="130" y="182" text-anchor="middle" font-size="9" fill="#333">Semantic Views (2)</text>
  <text x="130" y="194" text-anchor="middle" font-size="8" fill="#666">Portfolio + Market</text>

  <rect x="250" y="140" width="200" height="60" fill="#FFF3E0" stroke="#FF9800" stroke-width="2" rx="6"/>
  <text x="350" y="165" text-anchor="middle" font-size="10" font-weight="bold" fill="#E65100">Step 7</text>
  <text x="350" y="182" text-anchor="middle" font-size="9" fill="#333">Cortex Search Service</text>
  <text x="350" y="194" text-anchor="middle" font-size="8" fill="#666">Document RAG</text>

  <rect x="470" y="140" width="200" height="60" fill="#FCE4EC" stroke="#E91E63" stroke-width="2" rx="6"/>
  <text x="570" y="165" text-anchor="middle" font-size="10" font-weight="bold" fill="#880E4F">Step 8</text>
  <text x="570" y="182" text-anchor="middle" font-size="9" fill="#333">ML Models (Notebook)</text>
  <text x="570" y="194" text-anchor="middle" font-size="8" fill="#666">Train &amp; Register</text>

  <rect x="690" y="140" width="180" height="60" fill="#FCE4EC" stroke="#E91E63" stroke-width="2" rx="6"/>
  <text x="780" y="165" text-anchor="middle" font-size="10" font-weight="bold" fill="#880E4F">Step 9</text>
  <text x="780" y="182" text-anchor="middle" font-size="9" fill="#333">ML SQL Functions</text>
  <text x="780" y="194" text-anchor="middle" font-size="8" fill="#666">4 UDFs</text>

  <path d="M450,170 L470,170" fill="none" stroke="#666" stroke-width="1.5"/>
  <path d="M670,170 L690,170" fill="none" stroke="#666" stroke-width="1.5"/>

  <rect x="300" y="240" width="300" height="70" fill="#667EEA" stroke="#5A67D8" stroke-width="2" rx="8"/>
  <text x="450" y="270" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Step 10: CREATE AGENT</text>
  <text x="450" y="290" text-anchor="middle" font-size="10" fill="#E8EAFF">REIT_ADVISOR</text>
  <text x="450" y="302" text-anchor="middle" font-size="9" fill="#C3C8FF">Orchestrates all tools</text>

  <path d="M130,200 L130,240 L300,275" fill="none" stroke="#2196F3" stroke-width="2" stroke-dasharray="4"/>
  <path d="M350,200 L350,240 L380,240" fill="none" stroke="#FF9800" stroke-width="2" stroke-dasharray="4"/>

  <rect x="100" y="350" width="700" height="130" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="1" rx="6"/>
  <text x="450" y="375" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Agent Capabilities</text>

  <rect x="120" y="390" width="150" height="35" fill="#E8F5E9" stroke="#4CAF50" rx="4"/>
  <text x="195" y="412" text-anchor="middle" font-size="9" fill="#2E7D32">Property/Tenant/Lease</text>
  <text x="195" y="422" text-anchor="middle" font-size="8" fill="#555">Structured Queries</text>

  <rect x="290" y="390" width="150" height="35" fill="#E3F2FD" stroke="#2196F3" rx="4"/>
  <text x="365" y="412" text-anchor="middle" font-size="9" fill="#1565C0">Market/Dividends/KPIs</text>
  <text x="365" y="422" text-anchor="middle" font-size="8" fill="#555">Time Series</text>

  <rect x="460" y="390" width="150" height="35" fill="#FFF3E0" stroke="#FF9800" rx="4"/>
  <text x="535" y="412" text-anchor="middle" font-size="9" fill="#E65100">Earnings/Filings/KB</text>
  <text x="535" y="422" text-anchor="middle" font-size="8" fill="#555">Document Q&amp;A</text>

  <rect x="630" y="390" width="150" height="35" fill="#F3E5F5" stroke="#9C27B0" rx="4"/>
  <text x="705" y="412" text-anchor="middle" font-size="9" fill="#6A1B9A">Charts &amp; Graphs</text>
  <text x="705" y="422" text-anchor="middle" font-size="8" fill="#555">Visualization</text>

  <rect x="120" y="440" width="320" height="30" fill="#FCE4EC" stroke="#F48FB1" rx="4"/>
  <text x="280" y="460" text-anchor="middle" font-size="9" fill="#880E4F">ML: Lease Renewal Prediction | Risk Scoring | NOI Forecasting</text>

  <rect x="460" y="440" width="320" height="30" fill="#E8EAF6" stroke="#7986CB" rx="4"/>
  <text x="620" y="460" text-anchor="middle" font-size="9" fill="#283593">FIBO: Financial Ontology Compliance | Data Governance</text>
</svg>
