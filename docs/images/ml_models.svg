<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="Arial, sans-serif">
  <rect width="800" height="450" fill="#F8FAFC" rx="8"/>

  <text x="400" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#880E4F">ML Models Architecture</text>

  <rect x="30" y="50" width="350" height="180" fill="#FFF" stroke="#F48FB1" stroke-width="2" rx="6"/>
  <text x="205" y="75" text-anchor="middle" font-size="13" font-weight="bold" fill="#880E4F">Lease Renewal Predictor</text>
  <text x="205" y="92" text-anchor="middle" font-size="9" fill="#666">GradientBoostingClassifier</text>

  <text x="50" y="115" font-size="10" font-weight="bold" fill="#333">Input Features:</text>
  <text x="50" y="130" font-size="9" fill="#555">- Remaining lease term (months)</text>
  <text x="50" y="143" font-size="9" fill="#555">- Tenant credit rating</text>
  <text x="50" y="156" font-size="9" fill="#555">- Annual rent / Escalation rate</text>
  <text x="50" y="169" font-size="9" fill="#555">- Property type / Cap rate</text>
  <text x="50" y="182" font-size="9" fill="#555">- Tenant revenue / Public company</text>
  <text x="50" y="195" font-size="9" fill="#555">- Square footage / Occupancy</text>

  <rect x="250" y="105" width="115" height="50" fill="#E8F5E9" stroke="#4CAF50" rx="4"/>
  <text x="307" y="127" text-anchor="middle" font-size="9" font-weight="bold" fill="#2E7D32">Output:</text>
  <text x="307" y="142" text-anchor="middle" font-size="9" fill="#333">P(Renewal)</text>
  <text x="307" y="152" text-anchor="middle" font-size="8" fill="#666">0.0 - 1.0</text>

  <rect x="250" y="165" width="115" height="55" fill="#FFF3E0" stroke="#FF9800" rx="4"/>
  <text x="307" y="182" text-anchor="middle" font-size="9" font-weight="bold" fill="#E65100">Use Cases:</text>
  <text x="307" y="195" text-anchor="middle" font-size="8" fill="#333">Revenue forecasting</text>
  <text x="307" y="207" text-anchor="middle" font-size="8" fill="#333">Retention strategy</text>
  <text x="307" y="219" text-anchor="middle" font-size="8" fill="#333">Vacancy planning</text>

  <rect x="420" y="50" width="350" height="180" fill="#FFF" stroke="#7986CB" stroke-width="2" rx="6"/>
  <text x="595" y="75" text-anchor="middle" font-size="13" font-weight="bold" fill="#283593">Property Risk Classifier</text>
  <text x="595" y="92" text-anchor="middle" font-size="9" fill="#666">GradientBoostingClassifier</text>

  <text x="440" y="115" font-size="10" font-weight="bold" fill="#333">Input Features:</text>
  <text x="440" y="130" font-size="9" fill="#555">- Geographic risk score</text>
  <text x="440" y="143" font-size="9" fill="#555">- Tenant credit risk score</text>
  <text x="440" y="156" font-size="9" fill="#555">- Market / Interest rate risk</text>
  <text x="440" y="169" font-size="9" fill="#555">- Environmental risk score</text>
  <text x="440" y="182" font-size="9" fill="#555">- Lease expiration risk</text>
  <text x="440" y="195" font-size="9" fill="#555">- Cap rate / Property type</text>

  <rect x="640" y="105" width="115" height="50" fill="#E8F5E9" stroke="#4CAF50" rx="4"/>
  <text x="697" y="127" text-anchor="middle" font-size="9" font-weight="bold" fill="#2E7D32">Output:</text>
  <text x="697" y="142" text-anchor="middle" font-size="9" fill="#333">Risk Level</text>
  <text x="697" y="152" text-anchor="middle" font-size="8" fill="#666">Low/Medium/High</text>

  <rect x="640" y="165" width="115" height="55" fill="#FFF3E0" stroke="#FF9800" rx="4"/>
  <text x="697" y="182" text-anchor="middle" font-size="9" font-weight="bold" fill="#E65100">Use Cases:</text>
  <text x="697" y="195" text-anchor="middle" font-size="8" fill="#333">Portfolio monitoring</text>
  <text x="697" y="207" text-anchor="middle" font-size="8" fill="#333">Disposition analysis</text>
  <text x="697" y="219" text-anchor="middle" font-size="8" fill="#333">Insurance pricing</text>

  <rect x="30" y="255" width="350" height="80" fill="#FFF" stroke="#00ACC1" stroke-width="2" rx="6"/>
  <text x="205" y="280" text-anchor="middle" font-size="13" font-weight="bold" fill="#006064">NOI Forecaster (UDF)</text>
  <text x="205" y="297" text-anchor="middle" font-size="9" fill="#666">Table Function - Growth Projection</text>
  <text x="50" y="318" font-size="9" fill="#555">Inputs: Current NOI, Growth Rate, Periods Ahead</text>
  <text x="50" y="331" font-size="9" fill="#555">Output: Period-by-period NOI forecast with cumulative totals</text>

  <rect x="420" y="255" width="350" height="80" fill="#FFF" stroke="#AB47BC" stroke-width="2" rx="6"/>
  <text x="595" y="280" text-anchor="middle" font-size="13" font-weight="bold" fill="#6A1B9A">Property Scorer (UDF)</text>
  <text x="595" y="297" text-anchor="middle" font-size="9" fill="#666">Composite Scoring Function</text>
  <text x="440" y="318" font-size="9" fill="#555">Inputs: Cap rate, Occupancy, Credit, Lease term, NOI growth</text>
  <text x="440" y="331" font-size="9" fill="#555">Output: Score (0-100), Grade (A+-B), Recommendation</text>

  <rect x="100" y="365" width="600" height="70" fill="#ECEFF1" stroke="#90A4AE" stroke-width="1.5" rx="6"/>
  <text x="400" y="390" text-anchor="middle" font-size="12" font-weight="bold" fill="#37474F">Snowflake ML Registry</text>
  <text x="400" y="410" text-anchor="middle" font-size="10" fill="#555">REALTY_INCOME.ML.LEASE_RENEWAL_PREDICTOR v1</text>
  <text x="400" y="425" text-anchor="middle" font-size="10" fill="#555">REALTY_INCOME.ML.PROPERTY_RISK_CLASSIFIER v1</text>
</svg>
